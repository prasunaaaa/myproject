<!DOCTYPE html>
<html>
<head>
    <title>My Tasks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h2>My Workflow</h2>
        <p>User: <strong>{{ session['user'] }}</strong></p>
        <hr>
        <ul style="list-style: none; padding: 0;">
            {% for task in tasks %}
            <li style="padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                <span>{{ task.title }}</span>
                {% if task.status == 'Pending' %}
                <a href="/update_task/{{ task.id }}" style="background: #28a745; color: white; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 14px;">Mark Done</a>
                {% else %}
                <span style="color: #28a745; font-weight: bold;">✔ Completed</span>
                {% endif %}
            </li>
            {% endfor %}
        </ul>
        <p style="text-align:center; margin-top:20px;"><a href="/logout">Logout</a></p>
    </div>
</body>
</html>
